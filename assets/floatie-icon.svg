<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bfe6de"/>
      <stop offset="0.55" stop-color="#5cbcb1"/>
      <stop offset="1" stop-color="#2c8078"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4fbf8"/>
      <stop offset="1" stop-color="#cdeae3"/>
    </linearGradient>
    <radialGradient id="blush" cx="0.35" cy="0.3" r="0.75">
      <stop offset="0" stop-color="#ffe8dc"/>
      <stop offset="0.55" stop-color="#ffc4aa"/>
      <stop offset="1" stop-color="#ff9d7e"/>
    </radialGradient>
  </defs>

  <!-- full-bleed sea background -->
  <rect width="1024" height="1024" fill="url(#sea)"/>

  <!-- soft peach heart — dating/light-social cue (was sunset ball) -->
  <g transform="translate(742 308)" opacity="0.94">
    <path
      fill="url(#blush)"
      d="M0 52
         C-52 18 -78 -22 -52 -52
         C-30 -74 -8 -62 0 -38
         C8 -62 30 -74 52 -52
         C78 -22 52 18 0 52 Z"
    />
  </g>

  <!-- soft wave band near the bottom -->
  <path d="M0 812 Q170 762 340 812 T680 812 T1024 812 V1024 H0 Z" fill="#ffffff" opacity="0.14"/>
  <path d="M0 872 Q170 828 340 872 T680 872 T1024 872 V1024 H0 Z" fill="#ffffff" opacity="0.18"/>

  <!-- bottle -->
  <g transform="translate(512 528)">
    <!-- body -->
    <rect x="-118" y="-150" width="236" height="470" rx="96" fill="url(#glass)"/>
    <rect x="-118" y="-150" width="236" height="470" rx="96" fill="#7fc9bf" opacity="0.18"/>
    <!-- neck -->
    <rect x="-46" y="-262" width="92" height="130" rx="26" fill="url(#glass)"/>
    <!-- cork -->
    <rect x="-58" y="-300" width="116" height="56" rx="20" fill="#d99a5b"/>
    <rect x="-58" y="-300" width="116" height="26" rx="13" fill="#e6ac71"/>
    <!-- rolled note -->
    <rect x="-70" y="20" width="140" height="210" rx="16" fill="#fbf3df"/>
    <rect x="-40" y="70"  width="80" height="12" rx="6" fill="#cbb488"/>
    <rect x="-40" y="112" width="80" height="12" rx="6" fill="#cbb488"/>
    <rect x="-40" y="154" width="52" height="12" rx="6" fill="#cbb488"/>
    <!-- glass highlight -->
    <rect x="-92" y="-120" width="26" height="360" rx="13" fill="#ffffff" opacity="0.35"/>
  </g>
</svg>
